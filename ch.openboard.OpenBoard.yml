id: ch.openboard.OpenBoard
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: openboard
base: io.qt.qtwebengine.BaseApp
base-version: '6.10'
separate-locales: false
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  # dri and camera
  - --device=all
  - --filesystem=home

cleanup:
  - /include
  - /lib/cmake
  - /lib/*/cmake
  - /lib/pkgconfig
  - /mkspecs
  - /share/man
cleanup-commands:
  - /app/cleanup-BaseApp.sh

modules:
  - name: quazip
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/stachenov/quazip/archive/refs/tags/v1.7.1.tar.gz
        sha256: e3c7220e66d9f8024ef4aa98befb2592fea219a01736a400b07b11aa60964d02
        x-checker-data:
          type: anitya
          project-id: 4141
          stable-only: true
          url-template: https://github.com/stachenov/quazip/archive/refs/tags/v$version.tar.gz

  - name: poppler
    buildsystem: cmake-ninja
    builddir: true
    cleanup:
      - /bin/
    config-opts:
      - -DENABLE_UNSTABLE_API_ABI_HEADERS=ON
      - -DENABLE_CPP=ON
      - -DENABLE_QT5=OFF
      - -DENABLE_QT6=OFF
      - -DENABLE_GLIB=OFF
      - -DBUILD_GTK_TESTS=OFF
      - -DENABLE_GTK_DOC=OFF
      - -DENABLE_BOOST=OFF
      - -DENABLE_GPGME=OFF
    sources:
      - type: archive
        url: https://poppler.freedesktop.org/poppler-26.06.0.tar.xz
        sha256: 4cb4e5a3dc8cb5eec751c8a23c8ba19f61f96dedc0cd07d2aee6b0c8e2cf6ba4
        x-checker-data:
          type: anitya
          project-id: 3686
          stable-only: true
          url-template: https://poppler.freedesktop.org/poppler-$version.tar.xz

  - name: openboard
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_CXX_STANDARD=20  # For poppler
    build-commands:
      - install -Dm644 -t ${FLATPAK_DEST}/share/appdata ${FLATPAK_ID}.appdata.xml
      - mkdir -p /app/lib/ffmpeg
    sources:
      - type: archive
        url: https://github.com/OpenBoard-org/OpenBoard/archive/refs/tags/v1.7.7.tar.gz
        sha256: 2ea0989b8c304f64a124c09eb5e3cc71808c395f0942a26d5a3f79d4125df969
        x-checker-data:
          type: anitya
          project-id: 65331
          stable-only: true
          url-template: https://github.com/OpenBoard-org/OpenBoard/archive/refs/tags/v$version.tar.gz
      - type: patch
        path: patches/0001-Linux-Only-use-onboard-by-default-if-it-s-installed.patch
      - type: patch
        path: patches/0002-feat-disable-software-update-check.patch
      - type: patch
        path: patches/0003-support-poppler-26.04.patch
      - type: file
        path: ch.openboard.OpenBoard.appdata.xml
